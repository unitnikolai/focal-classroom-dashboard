version: 1
applications:
  - appRoot: focal
    frontend:
      phases:
        preBuild:
          commands:
            - rm -rf node_modules package-lock.json
            - npm install --ignore-scripts=false
        build:
          commands:
            - env | grep -e NEXT_PUBLIC_ -e LAMBDA_URL -e COGNITO_ -e CALLBACK_URL -e LOGOUT_URI >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
