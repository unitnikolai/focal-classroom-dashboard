version: 1
applications:
  - appRoot: focal
    frontend:
      phases:
        preBuild:
          commands:
            - rm -rf node_modules package-lock.json
            - npm install --ignore-scripts=false
        build:
          commands:
            - env
            - npm run build
            - cp -r public .next/standalone/
            - cp -r .next/static .next/standalone/.next/static
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
