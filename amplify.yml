version: 1
applications:
  - appRoot: focal
    frontend:
      phases:
        preBuild:
          commands:
            - npm install --ignore-scripts=false
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*